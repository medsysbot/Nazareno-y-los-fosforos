<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nazareno y los fósforos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    button,
    audio {
      -webkit-tap-highlight-color: transparent;
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #splash {
      background-image: url('splash.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 20;
    }

    #game {
      display: none;
      background-image: url('game.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 10;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      background: rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(4px);
      z-index: 30;
    }

    .hud-item {
      min-width: 88px;
      text-align: center;
      color: #fff5df;
      background: rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .hud-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      opacity: 0.85;
      margin-bottom: 4px;
      letter-spacing: 0.4px;
    }

    .hud-value {
      display: block;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    #gameScene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .zone {
      position: absolute;
      border: none;
      background: transparent;
      z-index: 8;
      border-radius: 12px;
      pointer-events: none;
    }

    .zone-debug {
      background: rgba(255, 0, 0, 0.18);
      border: 2px dashed rgba(255,255,255,0.8);
      border-radius: 10px;
    }

    .debug-hotspot {
      display: none;
      position: absolute;
      border-radius: 999px;
      border: 2px dashed rgba(255,255,255,0.75);
      background: rgba(255, 40, 0, 0.18);
      pointer-events: none;
      z-index: 40;
    }

    #playHotspot {
      position: absolute;
      border: none;
      outline: none;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      z-index: 50;
    }

    #throwHotspot {
      position: absolute;
      border: none;
      outline: none;
      background: transparent;
      border-radius: 30px;
      cursor: pointer;
      z-index: 18;
    }

    #throwHotspot:focus,
    #throwHotspot:active,
    #throwHotspot:focus-visible,
    #playHotspot:focus,
    #playHotspot:active,
    #playHotspot:focus-visible {
      outline: none;
      border: none;
      box-shadow: none;
    }

    .debug-throw {
      display: none;
      position: absolute;
      border-radius: 30px;
      border: 2px dashed rgba(255,255,255,0.75);
      background: rgba(255, 200, 0, 0.14);
      pointer-events: none;
      z-index: 17;
    }

    #matchInHand {
      position: absolute;
      z-index: 12;
      transition: opacity 0.12s ease;
      pointer-events: none;
    }

    #matchInHand::before {
      content: "";
      position: absolute;
      left: -6px;
      top: 22px;
      width: 8px;
      height: 84px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f3d7ac 0%, #c18756 100%);
      box-shadow: 0 0 3px rgba(0,0,0,0.2);
    }

    #matchInHand::after {
      content: "";
      position: absolute;
      left: -6px;
      top: 22px;
      width: 24px;
      height: 38px;
      background: radial-gradient(circle at 50% 75%, #fff8b6 0%, #ffd55b 30%, #ff9a22 62%, rgba(255,109,33,0.95) 100%);
      border-radius: 50% 50% 42% 42% / 62% 62% 38% 38%;
      box-shadow: 0 0 16px rgba(255,173,51,0.78), 0 0 28px rgba(255,108,24,0.4);
      animation: flameFlicker 0.22s infinite alternate ease-in-out;
    }

    #flyingMatch {
      position: absolute;
      width: 18px;
      height: 88px;
      opacity: 0;
      pointer-events: none;
      z-index: 14;
    }

    #flyingMatch::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 14px;
      width: 8px;
      height: 66px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f3d7ac 0%, #c18756 100%);
    }

    #flyingMatch::after {
      content: "";
      position: absolute;
      left: -1px;
      top: -7px;
      width: 20px;
      height: 30px;
      background: radial-gradient(circle at 50% 75%, #fff8b6 0%, #ffd55b 30%, #ff9a22 62%, rgba(255,109,33,0.95) 100%);
      border-radius: 50% 50% 42% 42% / 62% 62% 38% 38%;
      box-shadow: 0 0 12px rgba(255,173,51,0.72), 0 0 24px rgba(255,108,24,0.35);
      animation: flameFlicker 0.2s infinite alternate ease-in-out;
    }

    #impactFire {
      position: absolute;
      width: 52px;
      height: 72px;
      opacity: 0;
      pointer-events: none;
      z-index: 15;
      transform-origin: center bottom;
      transform: scale(0.72);
      transition: opacity 0.15s ease, transform 0.45s ease;
    }

    #impactFire::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 75%, #fff8b6 0%, #ffd55b 28%, #ff9820 58%, rgba(255,92,20,0.98) 100%);
      border-radius: 50% 50% 42% 42% / 62% 62% 38% 38%;
      box-shadow:
        0 0 16px rgba(255,173,51,0.82),
        0 0 30px rgba(255,108,24,0.48),
        0 0 48px rgba(255,72,0,0.20);
      animation: impactPulse 0.18s infinite alternate ease-in-out;
    }

    #impactFire.grow-1 { transform: scale(0.78); }
    #impactFire.grow-2 { transform: scale(1.18); }
    #impactFire.grow-3 { transform: scale(1.78); }

    #messageBox {
      position: absolute;
      transform: translate(-50%, -50%) scale(0.96);
      min-width: min(78vw, 420px);
      max-width: min(84vw, 520px);
      padding: 16px 20px;
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.18);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      color: #fff8e8;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      text-align: center;
      backdrop-filter: blur(5px);
    }

    #messageBox.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #messageTitle {
      display: block;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    #messageText {
      display: block;
      font-size: 15px;
      line-height: 1.38;
      opacity: 0.98;
    }

    #messageBox.success {
      background: rgba(20, 89, 36, 0.90);
      border-color: rgba(163, 255, 163, 0.45);
      box-shadow: 0 18px 40px rgba(17, 76, 34, 0.35);
    }

    #messageBox.warning {
      background: rgba(144, 78, 8, 0.92);
      border-color: rgba(255, 221, 128, 0.48);
      box-shadow: 0 18px 40px rgba(120, 69, 18, 0.34);
    }

    #messageBox.danger {
      background: rgba(150, 28, 28, 0.92);
      border-color: rgba(255, 166, 166, 0.45);
      box-shadow: 0 18px 40px rgba(117, 28, 28, 0.34);
    }

    #gameOverOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(2px);
      pointer-events: none;
    }

    #gameOverOverlay.show {
      display: flex;
    }

    #gameOverImage {
      width: min(78vw, 520px);
      max-width: 520px;
      height: auto;
      display: block;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,0.45));
    }

    @keyframes flameFlicker {
      from { transform: scale(0.98) rotate(-1deg); }
      to { transform: scale(1.04) rotate(1.5deg); }
    }

    @keyframes impactPulse {
      from { filter: brightness(0.98); }
      to { filter: brightness(1.10); }
    }

    /* ==========================================
       AJUSTES PC / LAPTOP
    ========================================== */
    @media (min-width: 769px) {
      #playHotspot {
        left: 56%;
        bottom: 4.3%;
        transform: translateX(-50%);
        width: 280px;
        height: 102px;
      }

      .debug-hotspot {
        left: 56%;
        bottom: 4.3%;
        transform: translateX(-50%);
        width: 280px;
        height: 102px;
      }

      #throwHotspot {
        right: 7%;
        top: 57%;
        width: 110px;
        height: 170px;
      }

      .debug-throw {
        right: 7%;
        top: 57%;
        width: 110px;
        height: 170px;
      }

      #matchInHand {
        right: 11.5%;
        top: 64.5%;
        width: 18px;
        height: 106px;
        transform: rotate(24deg);
        transform-origin: center 88%;
      }

      #messageBox {
        left: 50%;
        top: 56%;
      }
    }

    /* ==========================================
       AJUSTES MÓVIL / TABLET
    ========================================== */
    @media (max-width: 768px) {
      #playHotspot {
        left: 56%;
        bottom: 4.1%;
        transform: translateX(-50%);
        width: 260px;
        height: 96px;
      }

      .debug-hotspot {
        left: 56%;
        bottom: 4.1%;
        transform: translateX(-50%);
        width: 260px;
        height: 96px;
      }

      .hud {
        gap: 6px;
        padding: 10px 6px;
      }

      .hud-item {
        min-width: 72px;
        padding: 8px 8px;
      }

      .hud-label {
        font-size: 10px;
      }

      .hud-value {
        font-size: 18px;
      }

      #throwHotspot {
        right: 1.5%;
        top: 42%;
        width: 120px;
        height: 170px;
      }

      .debug-throw {
        right: 1.5%;
        top: 42%;
        width: 120px;
        height: 170px;
      }

      #matchInHand {
        right: 31.8%;
        top: 45.8%;
        width: 16px;
        height: 92px;
        transform: rotate(280deg);
        transform-origin: center 90%;
      }

      #messageBox {
        left: 50%;
        top: 25%;
        min-width: min(82vw, 340px);
        padding: 14px 16px;
      }

      #messageTitle {
        font-size: 17px;
      }

      #messageText {
        font-size: 14px;
      }

      #gameOverImage {
        width: min(82vw, 440px);
      }
    }
  </style>
</head>
<body>
  <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
  <audio id="sirenSound" src="siren.mp3" preload="auto"></audio>

  <section id="splash" class="screen">
    <button id="playHotspot" aria-label="Jugar"></button>
    <div class="debug-hotspot"></div>
  </section>

  <section id="game" class="screen">
    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">PUNTAJE</span>
        <span class="hud-value" id="scoreValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">NIVEL</span>
        <span class="hud-value" id="levelValue">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">TIROS</span>
        <span class="hud-value" id="shotsValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">RACHA</span>
        <span class="hud-value" id="streakValue">0</span>
      </div>
    </div>

    <div id="gameScene">
      <div id="matchInHand"></div>
      <div id="flyingMatch"></div>
      <div id="impactFire"></div>

      <button class="zone" id="zoneWater" style="left: 2%; top: 40%; width: 20%; height: 20%;" aria-label="Agua"></button>
      <button class="zone" id="zoneCement" style="left: 24%; top: 44%; width: 52%; height: 46%;" aria-label="Cemento"></button>
      <button class="zone" id="zoneLeaves" style="left: 15%; top: 42%; width: 22%; height: 12%;" aria-label="Hojas secas"></button>
      <button class="zone" id="zoneLogs" style="left: 83%; top: 33%; width: 16%; height: 15%;" aria-label="Leña"></button>
      <button class="zone" id="zoneFence" style="left: 78%; top: 16%; width: 21%; height: 32%;" aria-label="Fence"></button>

      <button id="throwHotspot" aria-label="Lanzar fósforo"></button>
      <div class="debug-throw"></div>
    </div>

    <div id="messageBox">
      <span id="messageTitle"></span>
      <span id="messageText"></span>
    </div>

    <div id="gameOverOverlay">
      <img id="gameOverImage" src="gameover.png" alt="Game Over" />
    </div>
  </section>

  <script>
    const splash = document.getElementById('splash');
    const game = document.getElementById('game');
    const playHotspot = document.getElementById('playHotspot');
    const throwHotspot = document.getElementById('throwHotspot');

    const bgMusic = document.getElementById('bgMusic');
    const sirenSound = document.getElementById('sirenSound');

    const scoreValue = document.getElementById('scoreValue');
    const levelValue = document.getElementById('levelValue');
    const shotsValue = document.getElementById('shotsValue');
    const streakValue = document.getElementById('streakValue');

    const matchInHand = document.getElementById('matchInHand');
    const flyingMatch = document.getElementById('flyingMatch');
    const impactFire = document.getElementById('impactFire');
    const gameScene = document.getElementById('gameScene');

    const messageBox = document.getElementById('messageBox');
    const messageTitle = document.getElementById('messageTitle');
    const messageText = document.getElementById('messageText');
    const gameOverOverlay = document.getElementById('gameOverOverlay');

    let score = 0;
    let level = 1;
    let shots = 0;
    let streak = 0;

    let animating = false;
    let fireTimeout = null;
    let sirenStopTimeout = null;
    let lossVisualTimeout = null;
    let fireGrowthTimers = [];
    let fireActive = false;
    let activeDangerLevel = 0;
    let messageTimer = null;

    /* ==========================================
       AJUSTES JS
       TOCA SOLO ESTOS TRES PARA EL VUELO
    ========================================== */
    const THROW_START_X = 0.89;
    const THROW_START_Y = 0.73;
    const THROW_ARC = 62;

    /* ==========================================
       PROBABILIDADES
    ========================================== */
    const DESTINATIONS = [
      { id: 'zoneWater', type: 'safe', danger: 0, weight: 20, title: 'Agua' },
      { id: 'zoneCement', type: 'safe', danger: 0, weight: 25, title: 'Cemento' },
      { id: 'zoneLeaves', type: 'danger-high', danger: 3, weight: 25, title: 'Hojas secas' },
      { id: 'zoneLogs', type: 'danger-mid', danger: 2, weight: 20, title: 'Leña' },
      { id: 'zoneFence', type: 'danger-low', danger: 1, weight: 10, title: 'Fence' }
    ];

    playHotspot.addEventListener('click', () => {
      splash.style.display = 'none';
      game.style.display = 'block';
      bgMusic.volume = 0.35;
      bgMusic.play().catch(() => {});
    });

    throwHotspot.addEventListener('click', () => {
      if (animating || fireActive) return;
      launchRandomMatch();
    });

    function zoneCenter(el) {
      const rect = el.getBoundingClientRect();
      const parent = gameScene.getBoundingClientRect();
      return {
        x: rect.left - parent.left + rect.width / 2,
        y: rect.top - parent.top + rect.height / 2
      };
    }

    function showMessage(kind, title, text, duration = 1800) {
      if (messageTimer) clearTimeout(messageTimer);
      messageBox.className = '';
      messageBox.classList.add(kind, 'show');
      messageTitle.textContent = title;
      messageText.textContent = text;

      messageTimer = setTimeout(() => {
        messageBox.classList.remove('show', 'success', 'warning', 'danger');
      }, duration);
    }

    function startSiren() {
      sirenSound.currentTime = 0;
      sirenSound.volume = 0.60;
      sirenSound.play().catch(() => {});
    }

    function stopSiren() {
      sirenSound.pause();
      sirenSound.currentTime = 0;
    }

    function clearGrowthTimers() {
      fireGrowthTimers.forEach(id => clearTimeout(id));
      fireGrowthTimers = [];
      if (lossVisualTimeout) clearTimeout(lossVisualTimeout);
      if (sirenStopTimeout) clearTimeout(sirenStopTimeout);
      lossVisualTimeout = null;
      sirenStopTimeout = null;
    }

    function resetFireVisual() {
      impactFire.classList.remove('grow-1', 'grow-2', 'grow-3');
      impactFire.style.opacity = '0';
      impactFire.style.pointerEvents = 'none';
      impactFire.onclick = null;
    }

    function resetGameOver() {
      gameOverOverlay.classList.remove('show');
    }

    function updateHud() {
      scoreValue.textContent = score;
      levelValue.textContent = level;
      shotsValue.textContent = shots;
      streakValue.textContent = streak;
    }

    function updateLevel() {
      level = 1 + Math.floor(shots / 5);
      updateHud();
    }

    function clearFireState() {
      fireActive = false;
      activeDangerLevel = 0;
      clearGrowthTimers();
      resetFireVisual();
      resetGameOver();

      if (fireTimeout) {
        clearTimeout(fireTimeout);
        fireTimeout = null;
      }
    }

    function failByFire() {
      fireActive = false;

      if (fireTimeout) {
        clearTimeout(fireTimeout);
        fireTimeout = null;
      }

      impactFire.classList.remove('grow-1', 'grow-2');
      impactFire.classList.add('grow-3');
      impactFire.style.opacity = '1';
      impactFire.style.pointerEvents = 'none';

      messageBox.classList.remove('show');
      gameOverOverlay.classList.add('show');

      sirenStopTimeout = setTimeout(() => {
        stopSiren();
      }, 8000);

      lossVisualTimeout = setTimeout(() => {
        resetFireVisual();
      }, 8000);

      streak = 0;
      updateHud();
    }

    function extinguishFire() {
      if (!fireActive) return;

      if (fireTimeout) {
        clearTimeout(fireTimeout);
        fireTimeout = null;
      }

      clearGrowthTimers();
      stopSiren();

      if (activeDangerLevel === 3) score -= 8;
      if (activeDangerLevel === 2) score -= 6;
      if (activeDangerLevel === 1) score -= 4;

      streak = 0;
      updateHud();

      showMessage(
        'warning',
        'Reaccionaste a tiempo',
        'Apagaste el fuego antes de que creciera más y antes de que llegaran los bomberos.',
        2400
      );

      fireActive = false;
      activeDangerLevel = 0;
      resetFireVisual();
    }

    function showExtinguishChance(targetEl, dangerLevel) {
      const end = zoneCenter(targetEl);

      impactFire.style.left = `${end.x - 26}px`;
      impactFire.style.top = `${end.y - 44}px`;
      impactFire.style.opacity = '1';
      impactFire.style.pointerEvents = 'auto';
      impactFire.classList.remove('grow-2', 'grow-3');
      impactFire.classList.add('grow-1');

      fireActive = true;
      activeDangerLevel = dangerLevel;
      impactFire.onclick = extinguishFire;

      startSiren();

      const reactTime = 7600;

      fireGrowthTimers.push(setTimeout(() => {
        if (!fireActive) return;
        impactFire.classList.remove('grow-1');
        impactFire.classList.add('grow-2');
      }, 2200));

      fireGrowthTimers.push(setTimeout(() => {
        if (!fireActive) return;
        impactFire.classList.remove('grow-2');
        impactFire.classList.add('grow-3');
      }, 5000));

      fireTimeout = setTimeout(failByFire, reactTime);
    }

    function animateMatchTo(targetEl, dangerLevel = 0, afterLanding) {
      if (animating || fireActive) return;
      animating = true;

      const startX = gameScene.clientWidth * THROW_START_X;
      const startY = gameScene.clientHeight * THROW_START_Y;
      const end = zoneCenter(targetEl);

      matchInHand.style.opacity = '0';
      flyingMatch.style.opacity = '1';
      impactFire.style.opacity = '0';
      impactFire.style.pointerEvents = 'none';

      const duration = 420;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const arc = Math.sin(t * Math.PI) * THROW_ARC;

        const x = startX + (end.x - startX) * eased;
        const y = startY + (end.y - startY) * eased - arc;
        const angle = 26 - (34 * eased);

        flyingMatch.style.left = `${x - 9}px`;
        flyingMatch.style.top = `${y - 44}px`;
        flyingMatch.style.transform = `rotate(${angle}deg)`;

        if (t < 1) {
          requestAnimationFrame(frame);
          return;
        }

        flyingMatch.style.opacity = '0';

        if (typeof afterLanding === 'function') {
          afterLanding();
        }

        if (dangerLevel > 0) {
          showExtinguishChance(targetEl, dangerLevel);
          setTimeout(() => {
            matchInHand.style.opacity = '1';
            animating = false;
          }, 120);
        } else {
          setTimeout(() => {
            matchInHand.style.opacity = '1';
            animating = false;
          }, 160);
        }
      }

      requestAnimationFrame(frame);
    }

    function pickRandomDestination() {
      const total = DESTINATIONS.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * total;

      for (const item of DESTINATIONS) {
        roll -= item.weight;
        if (roll <= 0) return item;
      }
      return DESTINATIONS[0];
    }

    function launchRandomMatch() {
      const picked = pickRandomDestination();
      const targetEl = document.getElementById(picked.id);

      if (!targetEl) return;

      shots += 1;
      updateLevel();
      resetGameOver();

      animateMatchTo(targetEl, picked.danger, () => {
        if (picked.type === 'safe') {
          score += 10;
          streak += 1;
          updateHud();
          showMessage(
            'success',
            'Destino: ' + picked.title,
            'El fósforo cayó en una zona segura.',
            1800
          );
        }

        if (picked.type === 'danger-high') {
          score -= 30;
          updateHud();
          showMessage(
            'danger',
            'Destino: hojas secas',
            'Cayó en una zona muy peligrosa. Reaccioná antes de que el fuego crezca.',
            2500
          );
        }

        if (picked.type === 'danger-mid') {
          score -= 20;
          updateHud();
          showMessage(
            'danger',
            'Destino: leña',
            'Cayó en leña. Tocá el fuego para apagarlo.',
            2400
          );
        }

        if (picked.type === 'danger-low') {
          score -= 10;
          updateHud();
          showMessage(
            'danger',
            'Destino: fence',
